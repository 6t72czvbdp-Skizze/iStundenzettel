<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stundenzettel</title>
<style>
body { margin: 0; padding: 0; background: #faf8f6; font-family: system-ui; }
.header { background: #d97757; color: white; padding: 20px; text-align: center; }
.header h1 { font-size: 28px; margin: 0; }
.header p { margin: 0; opacity: 0.9; }
.nav { background: white; padding: 12px; display: flex; gap: 10px; justify-content: center; }
.nav button { width: 40px; height: 40px; border: 1px solid #e8d5c4; background: #faf8f6; border-radius: 8px; cursor: pointer; font-size: 18px; }
.nav-text { font-weight: 600; color: #8b6f47; font-size: 16px; flex: 1; text-align: center; }
.container { max-width: 500px; margin: 0 auto; padding: 16px; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #f0e6d2; }
.day { padding: 12px; border-bottom: 1px solid #f5f0e8; }
.day:last-child { border-bottom: none; }
.day-label { font-weight: 600; color: #d97757; margin-bottom: 8px; font-size: 15px; }
input { width: 100%; padding: 8px; margin: 6px 0; border: 1px solid #e8d5c4; border-radius: 6px; background: #faf8f6; font-family: system-ui; font-size: 14px; }
input:focus { outline: none; border-color: #d97757; background: white; }
.buttons { display: flex; gap: 8px; margin-top: 10px; }
button.status { flex: 1; padding: 6px; border: 1px solid #e8d5c4; background: #faf8f6; color: #8b6f47; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
button.status.active { background: #d97757; color: white; border-color: #d97757; }
.summary { background: #e8d5c4; padding: 12px; border-radius: 10px; text-align: center; font-weight: 600; color: #8b6f47; margin: 16px 0; }
.actions { display: flex; gap: 10px; margin: 16px 0; }
.btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
.btn-print { background: #d97757; color: white; }
.btn-save { background: white; border: 2px solid #d97757; color: #d97757; }
.msg { text-align: center; color: #8b6f47; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>🕐 Stundenzettel</h1>
  <p>Marc Hoß</p>
</div>

<div class="nav">
  <button onclick="prev()">‹</button>
  <div class="nav-text" id="month">Mai 2026</div>
  <button onclick="next()">›</button>
</div>

<div class="container">
  <div id="content"></div>
  <div class="actions">
    <button class="btn btn-print" onclick="window.print()">🖨️ Drucken</button>
    <button class="btn btn-save" onclick="save()">💾 Speichern</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

<script>
let y = 2026, m = 4;
const MN = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const WT = ['So','Mo','Di','Mi','Do','Fr','Sa'];

function getDays(y, m) {
  let days = [];
  let last = new Date(y, m + 1, 0).getDate();
  for (let i = 1; i <= last; i++) {
    days.push({ day: i, dow: new Date(y, m, i).getDay() });
  }
  return days;
}

function show() {
  let days = getDays(y, m);
  let html = '<div style="font-size:13px; background:#fff9e6; border-left:3px solid #f59e0b; border-radius:8px; padding:12px; margin-bottom:16px;">📋 Tragen Sie Ihre Arbeitszeiten ein</div>';
  
  for (let day of days) {
    html += '<div class="card"><div class="day"><div class="day-label">' + WT[day.dow] + ' ' + String(day.day).padStart(2,'0') + '.' + String(m+1).padStart(2,'0') + '.</div>';
    html += '<input type="text" placeholder="Arbeitszeit (7:30-15:30)">';
    html += '<input type="text" placeholder="Stunden (8,50)">';
    html += '<div class="buttons">';
    html += '<button class="status">Normal</button>';
    html += '<button class="status">Krank</button>';
    html += '<button class="status">Frei</button>';
    html += '</div>';
    html += '<input type="text" placeholder="Begründung (optional)">';
    html += '</div></div>';
  }
  
  html += '<div class="summary">📊 Monat: ' + MN[m] + ' ' + y + '</div>';
  
  document.getElementById('content').innerHTML = html;
  document.getElementById('month').textContent = MN[m] + ' ' + y;
}

function prev() { m--; if (m < 0) { m = 11; y--; } show(); }
function next() { m++; if (m > 11) { m = 0; y++; } show(); }
function save() { document.getElementById('msg').textContent = '✅ Gespeichert!'; setTimeout(() => document.getElementById('msg').textContent = '', 2000); }

show();
</script>

</body>
</html>
