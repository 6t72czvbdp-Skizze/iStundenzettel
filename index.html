<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stundenzettel">
    <title>Stundenzettel – Willkommen</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4f9ff0 0%, #357abd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(53, 122, 189, 0.15);
            padding: 48px 32px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #888;
            font-weight: 400;
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 13px;
            color: #357abd;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            gap: 8px;
        }

        .label-icon {
            font-size: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8eef5;
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #1a1a1a;
            background: #f9fbfd;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4f9ff0;
            background: white;
            box-shadow: 0 4px 16px rgba(79, 159, 240, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        /* Hours Display */
        .hours-info {
            background: linear-gradient(135deg, #f9fbfd 0%, #f0f6fc 100%);
            border: 1px solid #e8eef5;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }

        .hours-info strong {
            color: #357abd;
            font-weight: 600;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .button-group button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f9ff0 0%, #357abd 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(79, 159, 240, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(79, 159, 240, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f6fc;
            color: #357abd;
            border: 2px solid #e8eef5;
        }

        .btn-secondary:hover {
            background: #e8eef5;
            border-color: #d0ddf0;
        }

        /* Footer Note */
        .footer-note {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e8eef5;
            font-size: 12px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 40px 24px;
            }

            .header h1 {
                font-size: 28px;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group button {
                width: 100%;
            }
        }

        /* Success State (optional) */
        .form-group.filled input {
            border-color: #4f9ff0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="emoji">👋</span>
            <h1>Willkommen!</h1>
            <p>Lass uns dich einrichten</p>
        </div>

        <form id="setupForm">
            <div class="form-group">
                <label for="name">
                    <span class="label-icon">👤</span>
                    Dein Name
                </label>
                <input 
                    type="text" 
                    id="name" 
                    placeholder="z.B. Max Mustermann" 
                    required
                    autocomplete="name"
                >
            </div>

            <div class="form-group">
                <label for="hours">
                    <span class="label-icon">📊</span>
                    Wochenstunden (gesamt)
                </label>
                <input 
                    type="number" 
                    id="hours" 
                    placeholder="z.B. 31" 
                    min="0"
                    max="99"
                    step="0.5"
                    required
                    autocomplete="off"
                >
                <div class="hours-info">
                    <strong>Tipp:</strong> Das sind deine geplanten Arbeitsstunden pro Woche.
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-secondary" onclick="handleCancel()">
                    Abbrechen
                </button>
                <button type="submit" class="btn-primary">
                    Weiter →
                </button>
            </div>
        </form>

        <div class="footer-note">
            💾 Deine Daten werden lokal auf deinem Gerät gespeichert.
        </div>
    </div>

    <script>
        const form = document.getElementById('setupForm');
        const nameInput = document.getElementById('name');
        const hoursInput = document.getElementById('hours');

        // Load saved data if exists
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('stundenzettel_user');
            if (saved) {
                const data = JSON.parse(saved);
                nameInput.value = data.name || '';
                hoursInput.value = data.hours || '';
            }
        });

        // Handle form submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = nameInput.value.trim();
            const hours = parseFloat(hoursInput.value);

            if (!name || !hours) {
                alert('Bitte alle Felder ausfüllen.');
                return;
            }

            // Save data
            const userData = { name, hours };
            localStorage.setItem('stundenzettel_user', JSON.stringify(userData));

            // Show success feedback
            const btn = form.querySelector('.btn-primary');
            const originalText = btn.textContent;
            btn.textContent = '✓ Gespeichert!';
            btn.style.pointerEvents = 'none';

            setTimeout(() => {
                // Redirect to main app or next page
                // Anpassen: Je nachdem wo deine Hauptseite ist
                window.location.href = './index.html'; // oder deine Hauptseite
            }, 1000);
        });

        function handleCancel() {
            if (confirm('Willst du wirklich abbrechen?')) {
                window.location.href = './'; // oder Startseite
            }
        }

        // Visual feedback when typing
        nameInput.addEventListener('input', (e) => {
            const group = e.target.closest('.form-group');
            if (e.target.value.trim()) {
                group.classList.add('filled');
            } else {
                group.classList.remove('filled');
            }
        });

        hoursInput.addEventListener('input', (e) => {
            const group = e.target.closest('.form-group');
            if (e.target.value) {
                group.classList.add('filled');
            } else {
                group.classList.remove('filled');
            }
        });
    </script>
</body>
</html>
