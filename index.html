<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stundenzettel">
    <title>Stundenzettel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4f9ff0 0%, #357abd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 60px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 80px;
            margin-bottom: 24px;
        }

        .logo-title {
            font-size: 36px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .logo-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .choice-card {
            background: white;
            border-radius: 20px;
            padding: 40px 24px;
            box-shadow: 0 20px 60px rgba(53, 122, 189, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: slideUp 0.6s ease-out;
        }

        .choice-card:nth-child(2) {
            animation-delay: 0.1s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .choice-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 80px rgba(53, 122, 189, 0.3);
        }

        .choice-card.admin {
            border: 3px solid #357abd;
        }

        .choice-card.admin:hover {
            border-color: #4f9ff0;
        }

        .choice-card.user {
            border: 3px solid #4f9ff0;
        }

        .choice-card.user:hover {
            border-color: #357abd;
        }

        .choice-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .choice-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .choice-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-top: 40px;
        }

        .footer a {
            color: rgba(255, 255, 255, 1);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .choices {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .logo-title {
                font-size: 28px;
            }

            .logo {
                font-size: 64px;
                margin-bottom: 16px;
            }

            .choice-card {
                padding: 32px 20px;
            }

            .choice-icon {
                font-size: 48px;
            }

            .choice-title {
                font-size: 18px;
            }
        }

        /* Click Animation */
        .choice-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo">⏰</div>
            <h1 class="logo-title">Stundenzettel</h1>
            <p class="logo-subtitle">Zeiterfassung leicht gemacht</p>
        </div>

        <!-- Choice Cards -->
        <div class="choices">
            <!-- Administrator -->
            <a href="dashboard.html" class="choice-card admin">
                <div class="choice-icon">🔐</div>
                <h2 class="choice-title">Administrator</h2>
                <p class="choice-desc">Alle Mitarbeiter & Saldo sehen</p>
            </a>

            <!-- Mitarbeiter -->
            <a href="setup.html" class="choice-card user">
                <div class="choice-icon">👤</div>
                <h2 class="choice-title">Mitarbeiter</h2>
                <p class="choice-desc">Einrichten & Stunden eintragen</p>
            </a>
        </div>

        <!-- Footer -->
        <div class="footer">
            💾 Alle Daten lokal gespeichert
        </div>
    </div>
</body>
</html>
