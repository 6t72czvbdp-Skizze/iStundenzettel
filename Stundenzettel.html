<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stundenzettel Marc Hoß</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#f0f0f0; padding:10px; }

.controls {
  background:white; padding:12px; border-radius:8px;
  margin-bottom:12px; display:flex; gap:10px; flex-wrap:wrap;
  align-items:flex-end; box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.cg { display:flex; flex-direction:column; gap:4px; }
.cg label { font-weight:bold; font-size:12px; }
.cg select, .cg input { padding:7px; border:1px solid #ccc; border-radius:4px; font-size:13px; }
.btn-gen  { padding:8px 16px; background:#4CAF50; color:white; border:none; border-radius:4px; font-size:13px; cursor:pointer; }
.btn-print{ padding:8px 16px; background:#2196F3; color:white; border:none; border-radius:4px; font-size:13px; cursor:pointer; }

.sheet {
  background:white; width:100%; max-width:800px; margin:0 auto;
  padding:15px; box-shadow:0 3px 15px rgba(0,0,0,0.2); border-radius:4px;
}

/* HEADER */
.hdr-top { display:flex; justify-content:space-between; margin-bottom:6px; }
.rgt { border:1px solid #333; padding:3px 10px; font-weight:bold; font-size:12px; }
.awo { font-size:16px; font-weight:bold; border:2px solid #333; border-radius:40%; padding:3px 8px; }
.hdr-row { font-size:12px; margin-bottom:4px; display:flex; gap:20px; flex-wrap:wrap; }
.ul { border-bottom:1px solid #333; min-width:100px; display:inline-block; }
.uebertrag-row { font-size:12px; margin-bottom:8px; }

/* TABELLE */
table { width:100%; border-collapse:collapse; font-size:12px; }
th { background:#ddd; border:1px solid #555; padding:6px 4px; text-align:center; font-size:11px; }
td { border:1px solid #999; padding:3px; height:26px; }
.tc { text-align:center; }

/* Eingaben */
input.az { width:100%; border:none; background:transparent; font-size:11px; text-align:center; padding:2px; }
input.az:focus { outline:1px solid #2196F3; background:#f0f8ff; }
input.hh { width:48px; border:1px solid #ccc; border-radius:3px; font-size:11px; text-align:center; padding:2px; }
input.gr { width:100%; border:none; background:transparent; font-size:10px; padding:2px; }
input.gr:focus { outline:1px solid #2196F3; }

/* Buttons */
.bwrap { display:flex; gap:2px; align-items:center; justify-content:center; }
.bm { width:26px; height:26px; background:#ff6b6b; color:white; border:none; border-radius:3px; font-size:15px; cursor:pointer; }
.bp { width:26px; height:26px; background:#51cf66; color:white; border:none; border-radius:3px; font-size:15px; cursor:pointer; }
.tm { display:flex; gap:2px; align-items:center; justify-content:center; }
.tdsp { font-size:11px; font-weight:bold; min-width:36px; text-align:center; }

/* +/- Anzeige */
.neg { color:#d32f2f; font-weight:bold; font-size:11px; }
.pos { color:#2e7d32; font-weight:bold; font-size:11px; }
.neu { color:#666; font-size:11px; }

/* Wochensummen */
.wrow td { background:#fffde7; }
.wcell { border:2px solid #333 !important; vertical-align:top; font-size:9px; line-height:1.8; padding:3px !important; }

/* Vorbereitungsbox */
.vbox {
  background:#fff9c4; border:1px solid #f0c040; border-radius:5px;
  padding:10px; margin:12px 0; display:flex; gap:8px; align-items:center;
  font-size:12px; flex-wrap:wrap;
}
.vdsp { font-size:15px; font-weight:bold; min-width:44px; text-align:center; }

/* Summen */
.sbox { margin:12px 0; padding:10px; background:#e8f5e9; border-radius:5px; font-size:13px; }
.sbox p { margin-bottom:4px; }
.sbox .ul2 { border-bottom:1px solid #333; min-width:80px; display:inline-block; font-weight:bold; }

/* Unterschriften */
.sigs { display:flex; justify-content:space-between; margin-top:30px; }
.sig { border-top:1px solid #333; min-width:180px; text-align:center; padding-top:5px; font-size:11px; }

/* PRINT */
@media print {
  body { background:white; padding:0; }
  .controls { display:none !important; }
  .sheet { box-shadow:none; padding:10mm; }
  .bm, .bp, .vbox, .sbox { display:none !important; }
  .bwrap { display:block; }
  .tm { display:block; }
  input.az { border:none; }
  input.hh { border:none; }
  .neg, .pos, .neu { display:none; }
  table { font-size:10px; }
  td { height:20px; }
  th { font-size:10px; }
}
</style>
</head>
<body>

<div class="controls">
  <div class="cg">
    <label>Monat:</label>
    <select id="sel-month">
      <option value="0">Januar</option>
      <option value="1">Februar</option>
      <option value="2">März</option>
      <option value="3">April</option>
      <option value="4">Mai</option>
      <option value="5">Juni</option>
      <option value="6">Juli</option>
      <option value="7">August</option>
      <option value="8">September</option>
      <option value="9">Oktober</option>
      <option value="10">November</option>
      <option value="11">Dezember</option>
    </select>
  </div>
  <div class="cg">
    <label>Jahr:</label>
    <select id="sel-year">
      <option value="2024">2024</option>
      <option value="2025">2025</option>
      <option value="2026" selected>2026</option>
      <option value="2027">2027</option>
      <option value="2028">2028</option>
    </select>
  </div>
  <div class="cg">
    <label>Übertrag (Stunden):</label>
    <input type="number" id="uebertrag" value="0" step="0.25" style="width:80px;">
  </div>
  <button class="btn-gen" onclick="generate()">▶ Generieren</button>
  <button class="btn-print" onclick="window.print()">🖨️ Drucken</button>
</div>

<div class="sheet" id="sheet">
  <p style="color:#999;padding:20px;">Monat und Jahr wählen, dann auf Generieren klicken.</p>
</div>

<script>
var AZ = {
  0:'7:30-15:00', 1:'10:00-14:20', 2:'8:00-13:30',
  3:'8:00-16:00', 4:'10:00-15:00'
};
var SOLL = {
  0:7.0, 1:4+20/60, 2:5.5, 3:8.5, 4:5.0
};
var PAUSE_MIN = { 0:30, 1:0, 2:0, 3:0, 4:0 };
var PAUSE_TXT = { 0:'0:30', 1:'-', 2:'-', 3:'0:15', 4:'-' };
var WT = ['Mo','Di','Mi','Do','Fr','Sa','So'];
var MN = ['Januar','Februar','März','April','Mai','Juni',
          'Juli','August','September','Oktober','November','Dezember'];

var teamMin = {};
var vorbMin = 60;

function toHHMM(min) {
  var sign = min < 0 ? '-' : '';
  var a = Math.abs(min);
  return sign + Math.floor(a/60) + ':' + String(a%60).padStart(2,'0');
}

function parseAZ(s, pauseMin) {
  if (!s || s === 'Frei' || s.indexOf('-') < 0) return 0;
  var parts = s.split('-');
  var p1 = parts[0].trim().split(':').map(Number);
  var p2 = parts[1].trim().split(':').map(Number);
  var diff = (p2[0]*60+p2[1]) - (p1[0]*60+p1[1]) - pauseMin;
  return Math.max(0, diff/60);
}

function generate() {
  var month = parseInt(document.getElementById('sel-month').value);
  var year  = parseInt(document.getElementById('sel-year').value);
  var ueb   = parseFloat(document.getElementById('uebertrag').value) || 0;

  teamMin = {};
  vorbMin = 60;

  var first = new Date(year, month, 1);
  var last  = new Date(year, month+1, 0);

  var html = '';

  // HEADER
  html += '<div class="hdr-top">';
  html += '<div class="rgt">RGT</div>';
  html += '<div class="awo">AWO</div>';
  html += '</div>';
  html += '<div class="hdr-row">';
  html += 'Name: <span class="ul">Marc Hoß</span>';
  html += '&nbsp;&nbsp;Monat: <span class="ul">' + MN[month] + ' ' + year + '</span>';
  html += '&nbsp;&nbsp;Wochenstunden: <span class="ul">31</span>';
  html += '</div>';
  html += '<div class="uebertrag-row">Übertrag Mehr-/Minderarbeitsstunden: <span class="ul">' + (ueb !== 0 ? ueb.toFixed(2) : '______') + '</span></div>';

  // TABELLE
  html += '<table>';
  html += '<thead><tr>';
  html += '<th style="width:13%">Datum</th>';
  html += '<th style="width:19%">Arbeitszeit</th>';
  html += '<th style="width:9%">Pause</th>';
  html += '<th style="width:15%">Stunden</th>';
  html += '<th style="width:11%">Team (Do)</th>';
  html += '<th style="width:8%">+/-</th>';
  html += '<th style="width:5%">Frei</th>';
  html += '<th>Begründung Mehr-/Minderarbeit</th>';
  html += '<th style="width:14%;border:2px solid #333;"></th>';
  html += '</tr></thead><tbody>';

  var d = new Date(first);
  var weekNum = 0;

  while (d.getMonth() === month) {
    var day = d.getDate();
    var dow = (d.getDay()+6) % 7; // 0=Mo

    // Nur Wochentage (Mo-Fr)
    if (dow >= 5) {
      d.setDate(d.getDate()+1);
      continue;
    }

    var isDo = (dow === 3);
    var isLast = (d.toDateString() === last.toDateString());

    var dateStr = String(day).padStart(2,'0') + '.' + String(month+1).padStart(2,'0') + '.';

    if (isDo) teamMin[day] = 60;

    // Team-Zelle
    var teamTD = '<td class="tc"><span style="color:#ccc;">—</span></td>';
    if (isDo) {
      teamTD = '<td class="tc">'
        + '<div class="tm">'
        + '<button class="bm" onclick="adjTeam('+day+',-15)">−</button>'
        + '<span class="tdsp" id="team-'+day+'">1:00</span>'
        + '<button class="bp" onclick="adjTeam('+day+',15)">+</button>'
        + '</div></td>';
    }

    html += '<tr id="tr-'+day+'">';
    html += '<td class="tc"><strong>'+WT[dow]+' '+dateStr+'</strong></td>';
    html += '<td class="tc"><input class="az" type="text" id="az-'+day+'" value="'+AZ[dow]+'" onchange="calc()"></td>';
    html += '<td class="tc">'+PAUSE_TXT[dow]+'</td>';
    html += '<td><div class="bwrap">'
          + '<button class="bm" onclick="adjH('+day+',-0.25)">−</button>'
          + '<input class="hh" type="number" id="ist-'+day+'" step="0.25" onchange="calc()">'
          + '<button class="bp" onclick="adjH('+day+',0.25)">+</button>'
          + '</div></td>';
    html += teamTD;
    html += '<td class="tc"><span id="diff-'+day+'" class="neu">—</span></td>';
    html += '<td class="tc"><input type="checkbox" id="free-'+day+'" onchange="calc()"></td>';
    html += '<td><input class="gr" type="text" id="gr-'+day+'" placeholder="z.B. kein Team"></td>';
    html += '<td class="wcell" id="wc-cell-'+day+'"></td>';
    html += '</tr>';

    // Wochensumme nach Freitag oder letztem Tag
    if (dow === 4 || isLast) {
      weekNum++;
      html += '<tr class="wrow" id="wrow-'+weekNum+'">'
            + '<td colspan="8" style="border:none;background:#fffde7;padding:5px;font-size:11px;">'
            + '<strong>Woche '+weekNum+':</strong> '
            + 'SOLL <span id="wsoll-'+weekNum+'">—</span>h | '
            + 'IST <span id="wist-'+weekNum+'">—</span>h | '
            + '<span id="wdiff-'+weekNum+'" class="neu">—</span>'
            + '</td>'
            + '<td class="wcell" id="ws-'+weekNum+'">'
            + 'Gesamt SOLL Woche:<br>Gesamt IST Woche:<br>+/-Stunden:'
            + '</td>'
            + '</tr>';
    }

    d.setDate(d.getDate()+1);
  }

  html += '</tbody></table>';

  // Vorbereitungsbox
  html += '<div class="vbox">'
        + '<strong>📚 Vorbereitungszeit (zu Hause) pro Woche:</strong>'
        + '<button class="bm" onclick="adjVorb(-15)">−</button>'
        + '<span class="vdsp" id="vorb">1:00</span>'
        + '<button class="bp" onclick="adjVorb(15)">+</button>'
        + '<span style="color:#888;">wird automatisch mitgezählt</span>'
        + '</div>';

  // Monats-Summen
  html += '<div class="sbox">'
        + '<p>Gesamt Monat IST: <span id="m-ist">—</span></p>'
        + '<p>Gesamt Monat SOLL: <span id="m-soll">—</span></p>'
        + '<p>Gesamt Monat +/-: <span id="m-diff" class="ul2">—</span></p>'
        + '</div>';

  // Unterschriften
  html += '<div class="sigs">'
        + '<div class="sig">Datum, Unterschrift Mitarbeiter*in</div>'
        + '<div class="sig">Datum, Unterschrift Koordinator*in</div>'
        + '</div>';

  document.getElementById('sheet').innerHTML = html;

  setTimeout(calc, 100);
}

function calc() {
  var month = parseInt(document.getElementById('sel-month').value);
  var year  = parseInt(document.getElementById('sel-year').value);
  var ueb   = parseFloat(document.getElementById('uebertrag').value) || 0;
  var first = new Date(year, month, 1);
  var last  = new Date(year, month+1, 0);

  var totIst = 0, totSoll = 0;
  var wIst = 0, wSoll = 0;
  var weekNum = 0;
  var d = new Date(first);

  while (d.getMonth() === month) {
    var day = d.getDate();
    var dow = (d.getDay()+6) % 7;

    if (dow >= 5) {
      d.setDate(d.getDate()+1);
      continue;
    }

    var isDo = (dow === 3);
    var isLast = (d.toDateString() === last.toDateString());
    var tagSoll = isDo ? SOLL[3]+1 : SOLL[dow];

    var azEl   = document.getElementById('az-'+day);
    var istEl  = document.getElementById('ist-'+day);
    var freeEl = document.getElementById('free-'+day);
    var diffEl = document.getElementById('diff-'+day);

    var ist = 0;
    var isFree = freeEl && freeEl.checked;

    if (!isFree) {
      if (istEl && !istEl.value && azEl && azEl.value) {
        // Automatisch berechnen
        if (isDo) {
          var basis = parseAZ(azEl.value, 0);
          ist = basis + 0.5 + (teamMin[day]||60)/60;
        } else {
          ist = parseAZ(azEl.value, PAUSE_MIN[dow]);
        }
        if (istEl) istEl.value = ist.toFixed(2);
      } else if (istEl && istEl.value) {
        ist = parseFloat(istEl.value) || 0;
        // Donnerstag: Team dazurechnen wenn IST manuell
        if (isDo) ist += (teamMin[day]||60)/60;
      }
    }

    // +/- pro Tag
    if (diffEl && !isFree) {
      var df = ist - tagSoll;
      diffEl.textContent = (df>=0?'+':'') + df.toFixed(2) + 'h';
      diffEl.className = df < -0.001 ? 'neg' : df > 0.001 ? 'pos' : 'neu';
    }

    totIst  += ist;
    totSoll += tagSoll;
    wIst    += ist;
    wSoll   += tagSoll;

    if (dow === 4 || isLast) {
      weekNum++;
      var wd = wIst - wSoll;
      var wsEl = document.getElementById('ws-'+weekNum);
      if (wsEl) {
        wsEl.innerHTML = 'Gesamt SOLL Woche: <strong>'+wSoll.toFixed(2)+'</strong><br>'
          + 'Gesamt IST Woche: <strong>'+wIst.toFixed(2)+'</strong><br>'
          + '+/-Stunden: <strong class="'+(wd<-0.001?'neg':wd>0.001?'pos':'')+'">'
          + (wd>=0?'+':'')+wd.toFixed(2)+'</strong>';
      }
      var wsollEl = document.getElementById('wsoll-'+weekNum);
      var wistEl  = document.getElementById('wist-'+weekNum);
      var wdiffEl = document.getElementById('wdiff-'+weekNum);
      if (wsollEl) wsollEl.textContent = wSoll.toFixed(2);
      if (wistEl)  wistEl.textContent  = wIst.toFixed(2);
      if (wdiffEl) {
        wdiffEl.textContent = (wd>=0?'+':'')+wd.toFixed(2)+'h';
        wdiffEl.className = wd<-0.001?'neg':wd>0.001?'pos':'neu';
      }
      wIst = 0; wSoll = 0;
    }

    d.setDate(d.getDate()+1);
  }

  // Vorbereitungszeit
  var vorbEl = document.getElementById('vorb');
  var vm = vorbEl ? (parseInt(vorbEl.getAttribute('data-min')) || 60) : 60;
  // Anzahl Arbeitswochen
  var wAnz = 0;
  var cd = new Date(year, month, 1);
  while (cd.getMonth() === month) {
    if (cd.getDay() === 1) wAnz++;
    cd.setDate(cd.getDate()+1);
  }
  if (wAnz === 0) wAnz = 1;
  totIst += (vm/60)*wAnz;

  // Monatssummen
  var mIstEl  = document.getElementById('m-ist');
  var mSollEl = document.getElementById('m-soll');
  var mDiffEl = document.getElementById('m-diff');
  if (mIstEl)  mIstEl.textContent  = totIst.toFixed(2)+'h';
  if (mSollEl) mSollEl.textContent = totSoll.toFixed(2)+'h';
  if (mDiffEl) {
    var md = totIst - totSoll + ueb;
    mDiffEl.textContent = (md>=0?'+':'')+md.toFixed(2)+'h';
    mDiffEl.className = 'ul2 ' + (md<-0.001?'neg':md>0.001?'pos':'');
  }
}

function adjH(day, amount) {
  var el = document.getElementById('ist-'+day);
  if (!el) return;
  var dow = (new Date(parseInt(document.getElementById('sel-year').value),
                      parseInt(document.getElementById('sel-month').value), day).getDay()+6)%7;
  var v = parseFloat(el.value) || 0;
  if (dow === 3) {
    var th = (teamMin[day]||60)/60;
    var basis = Math.max(0, v - th + amount);
    el.value = (basis + th).toFixed(2);
  } else {
    el.value = Math.max(0, v+amount).toFixed(2);
  }
  calc();
}

function adjTeam(day, minChange) {
  teamMin[day] = Math.max(0, (teamMin[day]||60) + minChange);
  var sp = document.getElementById('team-'+day);
  if (sp) sp.textContent = toHHMM(teamMin[day]);
  calc();
}

function adjVorb(minChange) {
  var el = document.getElementById('vorb');
  if (!el) return;
  vorbMin = Math.max(0, vorbMin + minChange);
  el.setAttribute('data-min', vorbMin);
  el.textContent = toHHMM(vorbMin);
  calc();
}
</script>
</body>
</html>
